<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyView 360</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f7;
  --surface: rgba(255,255,255,0.72);
  --surface-solid: #ffffff;
  --surface2: rgba(255,255,255,0.5);
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.12);
  --text: #1d1d1f;
  --text2: #424245;
  --muted: #86868b;
  --accent: #0071e3;
  --accent-hover: #0077ed;
  --accent-light: rgba(0,113,227,0.08);
  --danger: #ff3b30;
  --success: #30d158;
  --r: 14px;
  --r-lg: 18px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.05);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
}

body {
  font-family: -apple-system, 'SF Pro Display', 'SF Pro Text', BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── NAV ── */
nav {
  position: sticky; top: 0; z-index: 300;
  background: rgba(245,245,247,0.82);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  height: 52px;
  display: flex; align-items: center;
  padding: 0 24px; gap: 12px;
}
.logo {
  font-size: 17px; font-weight: 600; letter-spacing: -.02em;
  color: var(--text); flex-shrink: 0; display: flex; align-items: center; gap: 8px;
}
.logo svg { width: 22px; height: 22px; }
.nav-mid { flex: 1; }
.nav-right { display: flex; gap: 8px; align-items: center; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  border-radius: 980px; padding: 0 16px; height: 32px;
  font-size: 14px; font-weight: 400; cursor: pointer;
  border: none; transition: all .15s; white-space: nowrap;
  font-family: inherit; letter-spacing: -.01em;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary {
  background: rgba(0,0,0,0.055); color: var(--text);
  border: 1px solid transparent;
}
.btn-secondary:hover { background: rgba(0,0,0,0.09); }
.btn-ghost { background: none; color: var(--muted); border: 1px solid transparent; }
.btn-ghost:hover { background: rgba(0,0,0,0.055); color: var(--text); }
.btn-sm { height: 28px; padding: 0 12px; font-size: 13px; }
.btn-danger { background: rgba(255,59,48,0.1); color: var(--danger); }
.btn-danger:hover { background: rgba(255,59,48,0.18); }

/* ── LAYOUT ── */
.wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
.app-grid {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 20px; padding: 20px 24px; max-width: 1080px; margin: 0 auto;
  align-items: start;
}
@media(max-width:680px) { .app-grid { grid-template-columns: 1fr; } .sidebar { display: none!important; } }

/* ── SIDEBAR ── */
.sidebar {
  background: var(--surface);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  padding: 8px;
  position: sticky; top: 68px;
}
.sb-section { padding: 4px 0 2px; }
.sb-label {
  font-size: 11px; font-weight: 600; color: var(--muted);
  letter-spacing: .04em; text-transform: uppercase;
  padding: 4px 10px 6px;
}
.sb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: 10px;
  cursor: pointer; font-size: 13.5px; color: var(--text2);
  transition: background .1s; position: relative;
  border: none; background: none; width: 100%; text-align: left;
  font-family: inherit;
}
.sb-item:hover { background: rgba(0,0,0,0.04); }
.sb-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.sb-item .ico { font-size: 15px; flex-shrink: 0; width: 20px; text-align: center; }
.sb-item .label { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-item .cnt { font-size: 11px; color: var(--muted); flex-shrink: 0; }
.sb-item .del-btn {
  opacity: 0; background: none; border: none; cursor: pointer;
  font-size: 11px; color: var(--muted); padding: 2px 5px;
  border-radius: 5px; transition: .1s; font-family: inherit;
}
.sb-item:hover .del-btn { opacity: 1; }
.sb-item .del-btn:hover { background: rgba(255,59,48,.1); color: var(--danger); }
.sb-divider { height: 1px; background: var(--border); margin: 4px 10px; }

/* ── BREADCRUMB ── */
.breadcrumb {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px; color: var(--muted); padding: 16px 0 4px;
}
.breadcrumb .crumb { cursor: pointer; color: var(--accent); }
.breadcrumb .crumb:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--muted); font-size: 11px; }
.breadcrumb .current { color: var(--text2); }

/* ── TOP BAR ── */
.top-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; flex-wrap: wrap;
}
.top-bar-title { font-size: 22px; font-weight: 700; letter-spacing: -.03em; }
.top-bar-right { display: flex; gap: 8px; align-items: center; }
.count-chip {
  font-size: 12px; color: var(--muted);
  background: rgba(0,0,0,0.05); border-radius: 20px;
  padding: 3px 10px;
}

/* ── UPLOAD ZONE ── */
.upload-zone {
  border: 1.5px dashed rgba(0,113,227,.25);
  border-radius: var(--r-lg); padding: 28px 20px;
  text-align: center; cursor: pointer; transition: .2s all;
  background: rgba(0,113,227,.02); margin-bottom: 20px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent);
  background: rgba(0,113,227,.05);
}
.uz-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: rgba(0,113,227,.09);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 10px; font-size: 20px;
}
.upload-zone h3 { font-size: 14px; font-weight: 500; margin-bottom: 3px; color: var(--text); }
.upload-zone p { color: var(--muted); font-size: 12px; }
.tag-row { display: flex; gap: 5px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }
.tag {
  background: rgba(0,0,0,.05); border-radius: 20px;
  padding: 2px 9px; font-size: 10px; color: var(--muted);
}
.prog-wrap { margin-top: 10px; display: none; }
.prog-bar { height: 2px; background: rgba(0,0,0,.08); border-radius: 2px; overflow: hidden; }
.prog-fill { height: 100%; background: var(--accent); width: 0%; transition: width .3s; }
#fileInput { display: none; }

/* ── FOLDER GRID ── */
.folder-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 12px; margin-bottom: 24px;
}
.folder-card {
  background: var(--surface-solid);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  padding: 16px 14px 13px;
  cursor: pointer; transition: .18s all;
  display: flex; flex-direction: column; gap: 6px;
  position: relative;
}
.folder-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.fc-icon { font-size: 32px; line-height: 1; margin-bottom: 2px; }
.fc-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fc-meta { font-size: 11px; color: var(--muted); }
.fc-actions {
  display: flex; gap: 4px; margin-top: 4px; opacity: 0; transition: .12s;
}
.folder-card:hover .fc-actions { opacity: 1; }

/* ── PHOTO GRID ── */
.photo-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
}
.photo-card {
  background: var(--surface-solid);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  overflow: hidden; cursor: pointer; transition: .18s all;
}
.photo-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.thumb {
  width: 100%; aspect-ratio: 16/9; position: relative;
  overflow: hidden; background: #e8e8ed;
}
.thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.thumb-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.18);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: .18s;
}
.photo-card:hover .thumb-overlay { opacity: 1; }
.play-pill {
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(8px);
  border-radius: 980px; padding: 8px 18px;
  font-size: 13px; font-weight: 500; color: var(--text);
  display: flex; align-items: center; gap: 7px;
}
.badge-360 {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,.45); backdrop-filter: blur(8px);
  border-radius: 6px; padding: 2px 7px;
  font-size: 9px; font-weight: 700; letter-spacing: .08em;
  color: #fff; text-transform: uppercase;
}
.folder-chip {
  position: absolute; top: 8px; right: 8px;
  background: rgba(255,255,255,.85); backdrop-filter: blur(8px);
  border-radius: 6px; padding: 2px 8px;
  font-size: 9px; color: var(--text2); max-width: 80px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-body { padding: 10px 12px 11px; }
.card-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
.card-foot { display: flex; align-items: center; }
.card-size { font-size: 11px; color: var(--muted); }
.card-actions { display: flex; gap: 3px; margin-left: auto; }
.ic-btn {
  background: none; border: none; cursor: pointer;
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: var(--muted); transition: .1s;
}
.ic-btn:hover { background: rgba(0,0,0,.06); color: var(--text); }
.ic-btn.del:hover { background: rgba(255,59,48,.08); color: var(--danger); }

/* ── EMPTY ── */
.empty { grid-column: 1/-1; text-align: center; padding: 52px 20px; color: var(--muted); }
.empty-ico { font-size: 48px; opacity: .2; margin-bottom: 12px; }
.empty p { font-size: 14px; line-height: 1.6; }

/* ── VIEWER ── */
.viewer-modal {
  position: fixed; inset: 0; z-index: 600;
  background: #000;
  display: none; flex-direction: column;
}
.viewer-modal.open { display: flex; }
.viewer-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; background: rgba(0,0,0,.6);
  backdrop-filter: blur(20px); flex-shrink: 0; gap: 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.viewer-title { font-size: 14px; font-weight: 500; color: #fff; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.viewer-acts { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.viewer-btn {
  background: rgba(255,255,255,.1); border: none; color: #fff;
  border-radius: 980px; padding: 0 16px; height: 32px;
  font-size: 13px; cursor: pointer; transition: .15s; display: flex; align-items: center; gap: 6px;
  font-family: inherit;
}
.viewer-btn:hover { background: rgba(255,255,255,.18); }
.viewer-btn.close-btn { width: 32px; padding: 0; justify-content: center; border-radius: 50%; font-size: 16px; }
#pannellumContainer { flex: 1; position: relative; }

/* ── SHARE SHEET ── */
.sheet-bg {
  position: fixed; inset: 0; z-index: 800;
  background: rgba(0,0,0,.4);
  backdrop-filter: blur(12px);
  display: none; align-items: flex-end; justify-content: center;
  padding: 0;
}
.sheet-bg.open { display: flex; }
@media(min-width:600px) { .sheet-bg { align-items: center; } }
.sheet {
  background: var(--surface-solid);
  border-radius: 20px 20px 0 0; padding: 0;
  width: 100%; max-width: 480px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  animation: slideUp .25s cubic-bezier(.32,1,.23,1);
}
@media(min-width:600px) { .sheet { border-radius: 20px; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: none; opacity: 1; } }
.sheet-handle { width: 36px; height: 4px; background: rgba(0,0,0,.12); border-radius: 2px; margin: 10px auto 0; }
.sheet-header { padding: 14px 20px 0; }
.sheet-title { font-size: 17px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 4px; }
.sheet-sub { font-size: 13px; color: var(--muted); line-height: 1.4; }
.sheet-body { padding: 16px 20px; }
.link-box {
  display: flex; gap: 8px; margin-bottom: 10px;
  background: var(--bg); border-radius: 12px; padding: 10px 12px;
  border: 1px solid var(--border);
}
.link-box input {
  flex: 1; background: none; border: none; outline: none;
  font-size: 12px; color: var(--text2); font-family: 'SF Mono', 'Menlo', monospace;
  min-width: 0;
}
.copy-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: 8px; padding: 6px 14px; font-size: 13px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
  transition: .15s; font-family: inherit;
}
.copy-btn:hover { background: var(--accent-hover); }
.copy-btn.ok { background: var(--success); }
.share-info {
  font-size: 11.5px; color: var(--muted); line-height: 1.5;
  background: rgba(0,0,0,.03); border-radius: 10px; padding: 10px 12px;
  margin-bottom: 14px; border: 1px solid var(--border);
}
.share-info.warn { background: rgba(255,149,0,.06); border-color: rgba(255,149,0,.2); color: #a05a00; }
.methods-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.method-btn {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; cursor: pointer;
  transition: .14s; font-family: inherit; text-align: left;
}
.method-btn:hover { background: rgba(0,113,227,.05); border-color: rgba(0,113,227,.2); }
.method-ico { font-size: 20px; flex-shrink: 0; }
.method-info { display: flex; flex-direction: column; }
.method-name { font-size: 13px; font-weight: 500; color: var(--text); }
.method-desc { font-size: 11px; color: var(--muted); }
.sheet-footer { padding: 0 20px 24px; }
.sheet-cancel {
  width: 100%; padding: 14px; background: rgba(0,0,0,.05);
  border: none; border-radius: 12px; font-size: 15px; font-weight: 500;
  color: var(--text); cursor: pointer; font-family: inherit; transition: .14s;
}
.sheet-cancel:hover { background: rgba(0,0,0,.09); }

/* ── DIALOG ── */
.dialog-bg {
  position: fixed; inset: 0; z-index: 900;
  background: rgba(0,0,0,.35); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.dialog-bg.open { display: flex; }
.dialog {
  background: var(--surface-solid); border-radius: 16px;
  padding: 24px; width: min(360px, 100%);
  box-shadow: var(--shadow-lg);
  animation: popIn .2s cubic-bezier(.32,1,.23,1);
}
@keyframes popIn { from { transform: scale(.96); opacity: 0; } to { transform: none; opacity: 1; } }
.dialog h4 { font-size: 17px; font-weight: 600; letter-spacing: -.02em; margin-bottom: 16px; }
.dialog input, .dialog select {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 10px; padding: 10px 14px; color: var(--text);
  font-size: 15px; outline: none; margin-bottom: 12px; font-family: inherit;
  transition: border .15s;
}
.dialog input:focus, .dialog select:focus { border-color: var(--accent); }
.dialog select option { background: #fff; }
.dialog-btns { display: flex; gap: 8px; justify-content: flex-end; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: rgba(29,29,31,0.92); backdrop-filter: blur(20px);
  color: #fff; border-radius: 980px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
  z-index: 9999; transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 20px rgba(0,0,0,.2);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── SHARE VIEW (received link) ── */
.share-view {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px; text-align: center;
}
.share-view-inner { max-width: 460px; width: 100%; }
.share-view h2 { font-size: 24px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 6px; }
.share-view p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }
.folder-share-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
.fs-card {
  background: var(--surface-solid); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow); padding: 14px;
  cursor: pointer; transition: .15s; text-align: left;
}
.fs-card:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
.fs-card-ico { font-size: 26px; margin-bottom: 6px; }
.fs-card-name { font-size: 13px; font-weight: 500; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fs-card-meta { font-size: 11px; color: var(--muted); }
.fs-all {
  background: var(--surface-solid); border: 1px solid var(--border);
  border-radius: var(--r); box-shadow: var(--shadow);
  margin-bottom: 20px;
}
.fs-photo {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background .1s;
}
.fs-photo:last-child { border-bottom: none; }
.fs-photo:hover { background: rgba(0,0,0,.02); }
.fs-thumb { width: 52px; height: 32px; border-radius: 6px; object-fit: cover; background: #e8e8ed; flex-shrink: 0; }
.fs-pname { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.fs-arrow { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>

<!-- Shared link view is injected here if detected -->
<div id="sharedView" style="display:none"></div>

<!-- Normal App -->
<div id="normalApp">
<nav>
  <div class="logo">
    <svg viewBox="0 0 22 22" fill="none">
      <circle cx="11" cy="11" r="10" fill="#0071e3" opacity=".15"/>
      <circle cx="11" cy="11" r="6.5" stroke="#0071e3" stroke-width="1.5" fill="none"/>
      <ellipse cx="11" cy="11" rx="3.5" ry="6.5" stroke="#0071e3" stroke-width="1.2" fill="none"/>
      <line x1="1" y1="11" x2="21" y2="11" stroke="#0071e3" stroke-width="1.2"/>
    </svg>
    SkyView 360
  </div>
  <div class="nav-mid"></div>
  <div class="nav-right">
    <button class="btn btn-secondary btn-sm" onclick="openNewFolder()">Ordner</button>
    <button class="btn btn-primary btn-sm" onclick="triggerUpload()">+ Hochladen</button>
  </div>
</nav>
<input type="file" id="fileInput" accept=".jpg,.jpeg,image/jpeg" multiple>

<div class="app-grid">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <main>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="top-bar">
      <h1 class="top-bar-title" id="pageTitle">Alle Aufnahmen</h1>
      <div class="top-bar-right">
        <span class="count-chip" id="countChip">–</span>
        <button class="btn btn-secondary btn-sm" id="shareFolderBtn" style="display:none" onclick="shareCurrentFolder()">🔗 Ordner teilen</button>
      </div>
    </div>

    <div class="upload-zone" id="uploadZone" onclick="triggerUpload()">
      <div class="uz-icon">📷</div>
      <h3>Datei ablegen oder klicken</h3>
      <p>Equirectangular JPEG · DJI Air 3s</p>
      <div class="tag-row">
        <span class="tag">.jpg</span><span class="tag">.jpeg</span><span class="tag">360°</span>
      </div>
      <div class="prog-wrap" id="progWrap"><div class="prog-bar"><div class="prog-fill" id="progFill"></div></div></div>
    </div>

    <div id="foldersArea"></div>
    <div class="photo-grid" id="photoGrid"></div>
  </main>
</div>
</div><!-- /normalApp -->

<!-- Viewer -->
<div class="viewer-modal" id="viewerModal">
  <div class="viewer-bar">
    <span class="viewer-title" id="viewerTitle"></span>
    <div class="viewer-acts">
      <button class="viewer-btn" onclick="openShare()">🔗 Teilen</button>
      <button class="viewer-btn close-btn" onclick="closeViewer()">✕</button>
    </div>
  </div>
  <div id="pannellumContainer"></div>
</div>

<!-- Share Sheet -->
<div class="sheet-bg" id="shareSheet" onclick="if(event.target===this)closeShare()">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">Teilen</div>
      <div class="sheet-sub" id="sheetSub"></div>
    </div>
    <div class="sheet-body">
      <div class="link-box">
        <input type="text" id="shareLink" readonly>
        <button class="copy-btn" id="copyBtn" onclick="copyLink()">Kopieren</button>
      </div>
      <div class="share-info" id="shareInfo"></div>
      <div class="methods-grid">
        <button class="method-btn" onclick="shareVia('whatsapp')"><span class="method-ico">💬</span><span class="method-info"><span class="method-name">WhatsApp</span><span class="method-desc">Link senden</span></span></button>
        <button class="method-btn" onclick="shareVia('email')"><span class="method-ico">✉️</span><span class="method-info"><span class="method-name">E-Mail</span><span class="method-desc">Per Mail teilen</span></span></button>
        <button class="method-btn" onclick="shareVia('telegram')"><span class="method-ico">✈️</span><span class="method-info"><span class="method-name">Telegram</span><span class="method-desc">Link senden</span></span></button>
        <button class="method-btn" onclick="shareVia('native')"><span class="method-ico">⬆️</span><span class="method-info"><span class="method-name">Mehr…</span><span class="method-desc">System-Teilen</span></span></button>
      </div>
    </div>
    <div class="sheet-footer">
      <button class="sheet-cancel" onclick="closeShare()">Abbrechen</button>
    </div>
  </div>
</div>

<!-- Folder Dialog -->
<div class="dialog-bg" id="folderDialog" onclick="if(event.target===this)closeDialog('folderDialog')">
  <div class="dialog">
    <h4 id="folderDialogTitle">Neuer Ordner</h4>
    <input type="text" id="folderNameInput" placeholder="Name des Ordners" maxlength="40">
    <div class="dialog-btns">
      <button class="btn btn-ghost" onclick="closeDialog('folderDialog')">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmFolder()">Erstellen</button>
    </div>
  </div>
</div>

<!-- Move Dialog -->
<div class="dialog-bg" id="moveDialog" onclick="if(event.target===this)closeDialog('moveDialog')">
  <div class="dialog">
    <h4>In Ordner verschieben</h4>
    <select id="moveSelect"></select>
    <div class="dialog-btns">
      <button class="btn btn-ghost" onclick="closeDialog('moveDialog')">Abbrechen</button>
      <button class="btn btn-primary" onclick="confirmMove()">Verschieben</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"><span id="toastIco">✓</span><span id="toastMsg"></span></div>

<script>
// ── STATE ──
let db = loadDB();
let currentFolderId = null;
let currentPhoto = null;
let sharePayload = null; // what's currently in the share sheet
let viewer = null;
let movingPhotoId = null;
let editingFolderId = null;

function loadDB() {
  try { return JSON.parse(localStorage.getItem('sv360_db2') || 'null') || {folders:[],photos:[]}; }
  catch(e) { return {folders:[],photos:[]}; }
}
function saveDB() {
  try { localStorage.setItem('sv360_db2', JSON.stringify(db)); }
  catch(e) { toast('Speicher voll — bitte ältere Bilder löschen', '⚠️'); }
}
function esc(s) { const d=document.createElement('div');d.textContent=s;return d.innerHTML; }

// ── RENDER ──
function render() { renderSidebar(); renderBreadcrumb(); renderMain(); }

function renderSidebar() {
  const el = document.getElementById('sidebar');
  let h = `<div class="sb-section"><div class="sb-label">Mediathek</div>`;
  h += `<button class="sb-item ${currentFolderId===null?'active':''}" onclick="setFolder(null)">
    <span class="ico">🌐</span><span class="label">Alle Aufnahmen</span>
    <span class="cnt">${db.photos.length}</span></button>`;
  h += `</div>`;
  if (db.folders.length) {
    h += `<div class="sb-divider"></div><div class="sb-section"><div class="sb-label">Ordner</div>`;
    db.folders.forEach(f => {
      const c = db.photos.filter(p=>p.folderId===f.id).length;
      h += `<button class="sb-item ${currentFolderId===f.id?'active':''}" onclick="setFolder('${f.id}')">
        <span class="ico">📁</span><span class="label">${esc(f.name)}</span>
        <span class="cnt">${c}</span>
        <span class="del-btn" onclick="event.stopPropagation();deleteFolder('${f.id}')">✕</span>
      </button>`;
    });
    h += `</div>`;
  }
  h += `<div class="sb-divider"></div>
  <button class="sb-item" onclick="openNewFolder()"><span class="ico" style="opacity:.5">＋</span><span class="label" style="color:var(--muted)">Neuer Ordner</span></button>`;
  el.innerHTML = h;
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  if (!currentFolderId) { el.innerHTML=''; return; }
  const f = db.folders.find(f=>f.id===currentFolderId);
  el.innerHTML = `<span class="crumb" onclick="setFolder(null)">Alle Aufnahmen</span>
    <span class="sep">›</span><span class="current">${f?esc(f.name):''}</span>`;
}

function renderMain() {
  const inFolder = currentFolderId !== null;
  const f = inFolder ? db.folders.find(f=>f.id===currentFolderId) : null;
  const photos = inFolder ? db.photos.filter(p=>p.folderId===currentFolderId) : db.photos;

  document.getElementById('pageTitle').textContent = f ? f.name : 'Alle Aufnahmen';
  document.getElementById('countChip').textContent = photos.length + ' Foto' + (photos.length!==1?'s':'');
  document.getElementById('shareFolderBtn').style.display = inFolder && photos.length ? '' : 'none';

  // Folder cards (only in "Alle")
  const fa = document.getElementById('foldersArea');
  if (!inFolder && db.folders.length) {
    const folderMap = Object.fromEntries(db.folders.map(f=>[f.id, db.photos.filter(p=>p.folderId===f.id).length]));
    fa.innerHTML = `<div class="folder-grid">${db.folders.map(f=>`
      <div class="folder-card" onclick="setFolder('${f.id}')">
        <div class="fc-icon">📁</div>
        <div class="fc-name">${esc(f.name)}</div>
        <div class="fc-meta">${folderMap[f.id]||0} Foto${(folderMap[f.id]||0)!==1?'s':''}</div>
        <div class="fc-actions" onclick="event.stopPropagation()">
          <button class="btn btn-secondary btn-sm" style="font-size:11px;height:24px;padding:0 10px" onclick="openRename('${f.id}')">Umbenennen</button>
          <button class="btn btn-danger btn-sm" style="font-size:11px;height:24px;padding:0 10px" onclick="deleteFolder('${f.id}')">Löschen</button>
        </div>
      </div>`).join('')}</div>`;
  } else { fa.innerHTML=''; }

  // Photos
  const grid = document.getElementById('photoGrid');
  if (!photos.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-ico">📷</div><p>Noch keine Aufnahmen hier.<br>Lade eine DJI Air 3s 360°-Datei hoch.</p></div>`;
    return;
  }
  const folderNames = Object.fromEntries(db.folders.map(f=>[f.id,f.name]));
  grid.innerHTML = photos.map(p => {
    const fn = p.folderId && folderNames[p.folderId] ? folderNames[p.folderId] : '';
    return `<div class="photo-card" onclick="openViewer('${p.id}')">
      <div class="thumb">
        <img src="${p.dataUrl}" loading="lazy" alt="${esc(p.name)}">
        <span class="badge-360">360°</span>
        ${fn && !inFolder ? `<span class="folder-chip">📁 ${esc(fn)}</span>` : ''}
        <div class="thumb-overlay"><div class="play-pill">▶ Ansehen</div></div>
      </div>
      <div class="card-body">
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-foot">
          <span class="card-size">${p.size}</span>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="ic-btn" onclick="openSharePhoto('${p.id}')" title="Teilen">🔗</button>
            <button class="ic-btn" onclick="openMove('${p.id}')" title="Verschieben">📂</button>
            <button class="ic-btn del" onclick="deletePhoto('${p.id}')" title="Löschen">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── NAVIGATION ──
function setFolder(id) { currentFolderId = id; render(); }

// ── FOLDERS ──
function openNewFolder() {
  editingFolderId = null;
  document.getElementById('folderDialogTitle').textContent = 'Neuer Ordner';
  document.getElementById('folderNameInput').value = '';
  openDialog('folderDialog');
  setTimeout(()=>document.getElementById('folderNameInput').focus(), 80);
}
function openRename(id) {
  editingFolderId = id;
  const f = db.folders.find(f=>f.id===id);
  document.getElementById('folderDialogTitle').textContent = 'Umbenennen';
  document.getElementById('folderNameInput').value = f ? f.name : '';
  openDialog('folderDialog');
  setTimeout(()=>document.getElementById('folderNameInput').focus(), 80);
}
function confirmFolder() {
  const name = document.getElementById('folderNameInput').value.trim();
  if (!name) return;
  if (editingFolderId) {
    const f = db.folders.find(f=>f.id===editingFolderId);
    if (f) f.name = name;
    toast('Umbenannt');
  } else {
    db.folders.push({id:'f'+Date.now()+Math.random().toString(36).slice(2), name});
    toast('Ordner erstellt');
  }
  saveDB(); render(); closeDialog('folderDialog');
}
function deleteFolder(id) {
  if (!confirm('Ordner löschen? Fotos bleiben erhalten.')) return;
  db.folders = db.folders.filter(f=>f.id!==id);
  db.photos.forEach(p=>{ if(p.folderId===id) p.folderId=null; });
  if (currentFolderId===id) currentFolderId=null;
  saveDB(); render(); toast('Ordner gelöscht');
}

// ── MOVE ──
function openMove(photoId) {
  movingPhotoId = photoId;
  const sel = document.getElementById('moveSelect');
  const p = db.photos.find(p=>p.id===photoId);
  sel.innerHTML = `<option value="">— Kein Ordner —</option>` +
    db.folders.map(f=>`<option value="${f.id}" ${p&&p.folderId===f.id?'selected':''}>${esc(f.name)}</option>`).join('');
  openDialog('moveDialog');
}
function confirmMove() {
  const fid = document.getElementById('moveSelect').value || null;
  const p = db.photos.find(p=>p.id===movingPhotoId);
  if (p) { p.folderId = fid; saveDB(); render(); toast('Verschoben'); }
  closeDialog('moveDialog');
}

// ── UPLOAD ──
function triggerUpload() { document.getElementById('fileInput').click(); }
document.getElementById('fileInput').addEventListener('change', e => {
  [...e.target.files].forEach(processFile); e.target.value = '';
});
const uz = document.getElementById('uploadZone');
uz.addEventListener('dragover', e=>{e.preventDefault();uz.classList.add('drag-over')});
uz.addEventListener('dragleave', ()=>uz.classList.remove('drag-over'));
uz.addEventListener('drop', e=>{e.preventDefault();uz.classList.remove('drag-over');[...e.dataTransfer.files].forEach(processFile)});

function processFile(file) {
  if (!file.type.startsWith('image/')) { toast('Nur JPEG', '⚠️'); return; }
  const pw = document.getElementById('progWrap'), pf = document.getElementById('progFill');
  pw.style.display = 'block'; pf.style.width = '0%';
  const r = new FileReader();
  r.onprogress = e=>{ if(e.lengthComputable) pf.style.width=(e.loaded/e.total*88)+'%'; };
  r.onload = e => {
    pf.style.width = '100%';
    const sz = file.size>1048576?(file.size/1048576).toFixed(1)+' MB':(file.size/1024).toFixed(0)+' KB';
    db.photos.unshift({
      id: 'p'+Date.now()+Math.random().toString(36).slice(2),
      name: file.name.replace(/\.[^.]+$/, ''),
      size: sz, folderId: currentFolderId,
      dataUrl: e.target.result,
      added: new Date().toISOString()
    });
    saveDB(); render();
    setTimeout(()=>{pw.style.display='none';pf.style.width='0%'}, 600);
    toast('Hinzugefügt ✓');
  };
  r.readAsDataURL(file);
}

// ── VIEWER ──
function openViewer(photoId) {
  const p = db.photos.find(p=>p.id===photoId);
  if (!p) return;
  currentPhoto = p;
  document.getElementById('viewerTitle').textContent = p.name;
  document.getElementById('viewerModal').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (viewer) { viewer.destroy(); viewer=null; }
  viewer = pannellum.viewer('pannellumContainer', {
    type:'equirectangular', panorama:p.dataUrl,
    autoLoad:true, autoRotate:-1.5, showControls:true, compass:false,
    uiText:{loadButtonLabel:'Laden',loadingLabel:'Wird geladen…',bylineLabel:''}
  });
}
function closeViewer() {
  document.getElementById('viewerModal').classList.remove('open');
  document.body.style.overflow = '';
  if (viewer) { viewer.destroy(); viewer=null; }
}

// ── SHARE ──
// Encodes photo OR folder (all photos) as base64 JSON in the URL hash.
// The receiver sees a clean read-only view with all photos/folders intact.

function buildPhotoPayload(photo) {
  return {type:'photo', name:photo.name, dataUrl:photo.dataUrl};
}

function buildFolderPayload(folderId) {
  const f = db.folders.find(f=>f.id===folderId);
  const photos = db.photos.filter(p=>p.folderId===folderId).map(p=>({name:p.name,size:p.size,dataUrl:p.dataUrl}));
  return {type:'folder', name:f?f.name:'Ordner', photos};
}

function encodePayload(obj) {
  return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
}

function buildShareUrl(encoded) {
  return window.location.href.split('#')[0] + '#sv360=' + encoded;
}

function openSharePhoto(photoId) {
  const p = db.photos.find(p=>p.id===photoId) || currentPhoto;
  if (!p) return;
  currentPhoto = p;
  const encoded = encodePayload(buildPhotoPayload(p));
  const url = buildShareUrl(encoded);
  showShareSheet('Foto teilen', p.name, url, false);
}

function openShare() { // from viewer
  if (currentPhoto) openSharePhoto(currentPhoto.id);
}

function shareCurrentFolder() {
  if (!currentFolderId) return;
  const f = db.folders.find(f=>f.id===currentFolderId);
  const photos = db.photos.filter(p=>p.folderId===currentFolderId);
  if (!photos.length) { toast('Ordner ist leer', '⚠️'); return; }
  const encoded = encodePayload(buildFolderPayload(currentFolderId));
  const url = buildShareUrl(encoded);
  showShareSheet('Ordner teilen', (f?f.name:'Ordner') + ` (${photos.length} Fotos)`, url, true);
}

function showShareSheet(title, sub, url, isFolder) {
  document.getElementById('sheetTitle').textContent = title;
  document.getElementById('sheetSub').textContent = sub;
  document.getElementById('shareLink').value = url;
  document.getElementById('copyBtn').textContent = 'Kopieren';
  document.getElementById('copyBtn').classList.remove('ok');
  const kb = Math.round(url.length / 1024);
  const info = document.getElementById('shareInfo');
  if (kb > 5000) {
    info.className = 'share-info warn';
    info.innerHTML = `⚠️ Der Link ist ~${kb} KB groß. Bei sehr großen Fotos kann er in Messengern abgeschnitten werden. Empfehlung: Foto vor dem Upload auf ~8 MB verkleinern.`;
  } else {
    info.className = 'share-info';
    info.innerHTML = isFolder
      ? `✓ Alle ${document.getElementById('sheetSub').textContent.match(/\d+/)?.[0]||''} Fotos dieses Ordners sind im Link enthalten — kein Login, kein Server nötig.`
      : `✓ Das Foto ist direkt im Link enthalten — kein Login, kein Server nötig.`;
  }
  document.getElementById('shareSheet').classList.add('open');
}

function closeShare() { document.getElementById('shareSheet').classList.remove('open'); }

function copyLink() {
  navigator.clipboard.writeText(document.getElementById('shareLink').value).then(()=>{
    const b = document.getElementById('copyBtn');
    b.textContent='✓ Kopiert'; b.classList.add('ok');
    toast('Link kopiert!');
    setTimeout(()=>{b.textContent='Kopieren';b.classList.remove('ok')},2200);
  });
}

function shareVia(method) {
  const link = document.getElementById('shareLink').value;
  const title = document.getElementById('sheetTitle').textContent + ' – SkyView 360';
  if (method==='native' && navigator.share) { navigator.share({title, url:link}); return; }
  const map = {
    whatsapp:'https://wa.me/?text='+encodeURIComponent(title+'\n'+link),
    email:'mailto:?subject='+encodeURIComponent(title)+'&body='+encodeURIComponent('Schau dir diese 360°-Aufnahme an:\n\n'+link),
    telegram:'https://t.me/share/url?url='+encodeURIComponent(link)+'&text='+encodeURIComponent(title)
  };
  if (map[method]) window.open(map[method],'_blank');
}

// ── PHOTO DELETE ──
function deletePhoto(id) {
  if (!confirm('Aufnahme löschen?')) return;
  db.photos = db.photos.filter(p=>p.id!==id);
  saveDB(); render(); toast('Gelöscht');
}

// ── DIALOGS ──
function openDialog(id) { document.getElementById(id).classList.add('open'); }
function closeDialog(id) { document.getElementById(id).classList.remove('open'); }

// ── TOAST ──
function toast(msg, ico='✓') {
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastIco').textContent = ico;
  const t = document.getElementById('toast');
  t.classList.add('show'); clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2600);
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key==='Escape') { closeViewer(); closeShare(); closeDialog('folderDialog'); closeDialog('moveDialog'); }
});
document.getElementById('folderNameInput').addEventListener('keydown', e => { if(e.key==='Enter') confirmFolder(); });

// ── SHARED LINK RECEIVER ──
function checkHash() {
  const hash = window.location.hash;
  if (!hash.startsWith('#sv360=')) return false;
  try {
    const raw = decodeURIComponent(hash.slice(7));
    const data = JSON.parse(decodeURIComponent(escape(atob(raw))));
    if (data.type === 'photo') showSharedPhoto(data);
    else if (data.type === 'folder') showSharedFolder(data);
    return true;
  } catch(e) { toast('Ungültiger Share-Link', '⚠️'); return false; }
}

function showSharedPhoto(data) {
  document.getElementById('normalApp').style.display = 'none';
  document.getElementById('sharedView').style.display = 'block';
  // Open in viewer directly
  document.getElementById('sharedView').innerHTML = `
    <div style="height:100vh;display:flex;flex-direction:column;background:#000">
      <div class="viewer-bar">
        <span class="viewer-title">${esc(data.name)}</span>
        <div class="viewer-acts">
          <button class="viewer-btn" onclick="saveSharedPhoto()" >💾 Speichern</button>
          <button class="viewer-btn" onclick="location.hash='';location.reload()">✕</button>
        </div>
      </div>
      <div id="sharedPanorama" style="flex:1;position:relative"></div>
    </div>`;
  window._sharedData = data;
  pannellum.viewer('sharedPanorama', {
    type:'equirectangular', panorama:data.dataUrl,
    autoLoad:true, autoRotate:-1.5, showControls:true, compass:false,
    uiText:{loadButtonLabel:'Laden',loadingLabel:'Wird geladen…',bylineLabel:''}
  });
}

function saveSharedPhoto() {
  const data = window._sharedData;
  if (!data) return;
  db.photos.unshift({id:'p'+Date.now(),name:data.name,size:'',folderId:null,dataUrl:data.dataUrl,added:new Date().toISOString()});
  saveDB();
  toast('In deiner Sammlung gespeichert!');
  setTimeout(()=>{location.hash='';location.reload()},1200);
}

function showSharedFolder(data) {
  document.getElementById('normalApp').style.display = 'none';
  const sv = document.getElementById('sharedView');
  sv.style.display = 'block';
  sv.innerHTML = `<nav style="position:sticky;top:0;z-index:100;background:rgba(245,245,247,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 24px;gap:12px">
    <div class="logo"><svg viewBox="0 0 22 22" fill="none"><circle cx="11" cy="11" r="10" fill="#0071e3" opacity=".15"/><circle cx="11" cy="11" r="6.5" stroke="#0071e3" stroke-width="1.5" fill="none"/><ellipse cx="11" cy="11" rx="3.5" ry="6.5" stroke="#0071e3" stroke-width="1.2" fill="none"/><line x1="1" y1="11" x2="21" y2="11" stroke="#0071e3" stroke-width="1.2"/></svg>SkyView 360</div>
    <div style="flex:1"></div>
    <button class="btn btn-primary btn-sm" onclick="saveSharedFolder()">💾 Alle speichern</button>
  </nav>
  <div style="max-width:720px;margin:0 auto;padding:28px 20px">
    <p style="font-size:12px;color:var(--muted);margin-bottom:6px">Geteilter Ordner</p>
    <h2 style="font-size:26px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px">${esc(data.name)}</h2>
    <p style="color:var(--muted);font-size:14px;margin-bottom:24px">${data.photos.length} Foto${data.photos.length!==1?'s':''}</p>
    <div class="photo-grid">${data.photos.map((p,i)=>`
      <div class="photo-card" onclick="openSharedPhoto(${i})">
        <div class="thumb">
          <img src="${p.dataUrl}" loading="lazy" alt="${esc(p.name)}">
          <span class="badge-360">360°</span>
          <div class="thumb-overlay"><div class="play-pill">▶ Ansehen</div></div>
        </div>
        <div class="card-body">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-foot"><span class="card-size">${p.size||''}</span></div>
        </div>
      </div>`).join('')}
    </div>
  </div>
  <div id="sharedFolderViewer" class="viewer-modal">
    <div class="viewer-bar">
      <span class="viewer-title" id="sfvTitle"></span>
      <div class="viewer-acts">
        <button class="viewer-btn close-btn" onclick="closeSharedViewer()">✕</button>
      </div>
    </div>
    <div id="sfvPano" style="flex:1;position:relative"></div>
  </div>`;
  window._sharedFolder = data;
  window._sfViewer = null;
}

function openSharedPhoto(idx) {
  const data = window._sharedFolder;
  const p = data.photos[idx];
  document.getElementById('sfvTitle').textContent = p.name;
  document.getElementById('sharedFolderViewer').classList.add('open');
  document.body.style.overflow = 'hidden';
  if (window._sfViewer) { window._sfViewer.destroy(); window._sfViewer=null; }
  window._sfViewer = pannellum.viewer('sfvPano', {
    type:'equirectangular', panorama:p.dataUrl,
    autoLoad:true, autoRotate:-1.5, showControls:true, compass:false,
    uiText:{loadButtonLabel:'Laden',loadingLabel:'Wird geladen…',bylineLabel:''}
  });
}
function closeSharedViewer() {
  document.getElementById('sharedFolderViewer').classList.remove('open');
  document.body.style.overflow='';
  if (window._sfViewer) { window._sfViewer.destroy(); window._sfViewer=null; }
}

function saveSharedFolder() {
  const data = window._sharedFolder;
  if (!data) return;
  const fid = 'f'+Date.now();
  db.folders.push({id:fid, name:data.name});
  data.photos.forEach((p,i)=>{
    db.photos.push({id:'p'+Date.now()+i,name:p.name,size:p.size||'',folderId:fid,dataUrl:p.dataUrl,added:new Date().toISOString()});
  });
  saveDB();
  toast('Ordner in deiner Sammlung gespeichert!');
  setTimeout(()=>{location.hash='';location.reload()},1400);
}

// ── INIT ──
const isShared = checkHash();
if (!isShared) render();
</script>
</body>
</html>
